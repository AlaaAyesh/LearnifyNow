name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: "Unique build identifier"
        required: true
        type: string
      ios_path:
        description: "Unused (kept for builder compatibility)"
        required: false
        type: string
        default: "ios"
      scheme:
        description: "Unused (kept for builder compatibility)"
        required: false
        type: string
        default: "Runner"
      use_signing:
        description: "Unused (kept for builder compatibility)"
        required: false
        type: boolean
        default: false
      configuration:
        description: "Unused (kept for builder compatibility)"
        required: false
        type: string
        default: "Release"
      flutter_version:
        description: "Flutter version to use (empty = latest stable)"
        required: false
        type: string
        default: ""

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version || "" }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned IPA
        run: flutter build ipa --release --no-codesign

      - name: Rename IPA with build id
        run: |
          set -e
          mkdir -p build
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -type f | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA file found in build/ios/ipa"
            exit 1
          fi
          cp "$IPA_PATH" "build/${{ inputs.build_id }}.ipa"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
