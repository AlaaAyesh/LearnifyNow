name: iOS Build

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Unique build identifier'
        required: true
        type: string
      ios_path:
        description: 'Path to iOS project'
        required: false
        type: string
        default: '.'
      scheme:
        description: 'Xcode scheme to build'
        required: false
        type: string
        default: ''
      use_signing:
        description: 'Enable code signing'
        required: false
        type: boolean
        default: false
      configuration:
        description: 'Build configuration'
        required: false
        type: string
        default: 'Debug'
      flutter_version:
        description: 'Flutter version (empty = latest stable)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "type=flutter" >> $GITHUB_OUTPUT
          else
            echo "type=native" >> $GITHUB_OUTPUT
          fi

      - name: Setup Flutter
        if: steps.detect.outputs.type == 'flutter'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: stable
          cache: true

      - name: Flutter pub get
        if: steps.detect.outputs.type == 'flutter'
        run: flutter pub get

      - name: Build IPA
        env:
          BUILD_ID: ${{ inputs.build_id }}
          IOS_PATH: ${{ inputs.ios_path }}
          CONFIGURATION: ${{ inputs.configuration }}
        run: |
          set -e
          exec > build_log.txt 2>&1
          cd "$IOS_PATH"
          if [ -f "Podfile" ]; then
            pod install
          fi

          DERIVED_DATA_PATH="${GITHUB_WORKSPACE}/DerivedData"
          cd ..
          if [ "$CONFIGURATION" = "Debug" ]; then
            flutter build ios --debug --no-codesign
          else
            flutter build ios --release --no-codesign
          fi

          APP_PATH=$(find "${GITHUB_WORKSPACE}/build/ios/iphoneos" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find .app"
            exit 1
          fi

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -rq "$BUILD_ID.ipa" Payload
          rm -rf Payload

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build_log.txt
          retention-days: 7

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ipa
          path: build/*.ipa
          retention-days: 7
          if-no-files-found: ignore
